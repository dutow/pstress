name: Build PSTRESS package
on: 
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]
env:
  CC: clang
  CXX: clang++
      
jobs:
  build:
    strategy:
      matrix:
        ubuntu_version: [22,24]
        build_type: [Debug,RelWithDebInfo]
    name: PSTRESS build
    runs-on: ubuntu-${{ matrix.ubuntu_version }}.04
    steps:

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"
          sudo apt-get install -y python3-full pipx cmake ninja-build
          pipx ensurepath
          sudo pipx install conan

      - name: Setup conan
        run: |
          conan profile detect
          sed -i 's/gnu../20/g' /home/runner/.conan2/profiles/default 
          cat /home/runner/.conan2/profiles/default

      - name: Clone repository
        uses: actions/checkout@master
        with:
          path: 'src/pstress'

      - name: Install/build dependencies
        run: |
          conan install . --build=missing --settings=build_type=${{ matrix.build_type }}
        working-directory: src/pstress


      - name: Build pstress
        run: |
          conan build . --settings=build_type=${{ matrix.build_type }}
        working-directory: src/pstress

      - name: Create release directory
        run: |
          mkdir release
          cp -r src/pstress/bin release/
          cp -r src/pstress/pstress release/

      - name: Upload tgz
        uses: actions/upload-artifact@v4
        with:
          name: pstress_${{ matrix.build_type }}_${{matrix.ubuntu_version }}
          path: release

      - name: Create tgz
        run: |
          export GLIBC_VER=`ldd --version | head -n 1 | cut -d " " -f 5 | tr "." "_"`
          mkdir tars
          cd release && sudo tar -czvf ../tars/pstress_${{ matrix.build_type }}_glibc$GLIBC_VER.tar.gz .

      - name: Publish release
        uses: ncipollo/release-action@v1
        # Only try and deploy on merged code
        if: github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'schedule')
        with:
          artifacts: "tars/pstress_*"
          omitBody: true
          allowUpdates: true
          generateReleaseNotes: false
          makeLatest: true
          tag: "latest"
          name: "HEAD"
          replacesArtifacts: true
